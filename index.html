<script>
    // Обновление даты
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ru-RU');

    const apps = {
        portal: { name: 'Главный портал', file: 'portal_main.html', icon: 'home', color: '#3498db' },
        lubrication: { name: 'График смазки', file: 'График-смазки7.html', icon: 'oil-can', color: '#3498db' },
        servo: { name: 'Диагностика сервоприводов', file: 'Диагностика серво двигателей.html', icon: 'microchip', color: '#27ae60' }
    };

    let currentApp = 'portal';
    let loadingTimeout = null;

    function switchApp(appId) {
        if (!apps[appId]) return;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn${appId.charAt(0).toUpperCase() + appId.slice(1)}`).classList.add('active');
        const container = document.getElementById('iframeContainer');
        container.classList.add('loading');
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => container.classList.remove('loading'), 1000);
        const frame = document.getElementById('appFrame');
        frame.src = apps[appId].file;
        document.getElementById('statusText').textContent = `Активно: ${apps[appId].name}`;
        currentApp = appId;
    }

    document.getElementById('appFrame').addEventListener('load', function() {
        const container = document.getElementById('iframeContainer');
        if (container.classList.contains('loading')) setTimeout(() => container.classList.remove('loading'), 500);
    });

    window.addEventListener('storage', (event) => {
        if (event.key === 'lubrication_data_updated' || event.key === 'servo_data_updated') {
            document.getElementById('statusText').textContent = 'Данные обновлены';
            setTimeout(() => document.getElementById('statusText').textContent = `Активно: ${apps[currentApp].name}`, 3000);
        }
    });

    function checkFiles() {
        const files = ['portal_main.html', 'График-смазки7.html', 'Диагностика серво двигателей.html'];
        files.forEach(file => {
            fetch(file).catch(() => console.warn(`⚠️ Файл ${file} недоступен`));
        });
    }
    window.addEventListener('load', () => { checkFiles(); document.getElementById('statusText').textContent = `Активно: ${apps.portal.name}`; });
</script>

<script>
// ============= GitHub СИНХРОНИЗАЦИЯ =============
const GITHUB_CONFIG = {
    OWNER: 'alexandr-1526',
    REPO: 'nlvz-portal',
    FILE_PATH: 'db_portal.json',
    BRANCH: 'main',
    TOKEN: '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'
};

// Загрузка данных из GitHub при открытии страницы
async function autoLoadFromGitHub() {
    console.log('🔄 Автоматическая загрузка данных из GitHub...');
    try {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/${GITHUB_CONFIG.FILE_PATH}`;
        const response = await fetch(url);
        if (!response.ok) {
            if (response.status === 404) console.log('ℹ️ Файл db_portal.json ещё не создан');
            else throw new Error(`HTTP ${response.status}`);
            return;
        }
        const data = await response.json();
        if (data.lubricationData) localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
        if (data.servoData) localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
        if (data.employees) localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
        if (data.lastCompleted) localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
        if (data.shiftClosed) localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
        console.log('✅ Данные загружены из GitHub');
        showNotification('✅ Данные загружены из облака', 'success');
        setTimeout(() => { if (confirm('Данные обновлены. Обновить страницу?')) location.reload(); }, 500);
    } catch (error) {
        console.error('❌ Ошибка автосинхронизации:', error);
        showNotification('⚠️ Не удалось загрузить данные из облака. Работаем локально.', 'warning');
    }
}

// Сохранение данных в GitHub
async function syncToGitHub() {
    showLoading('Сохраняем в облако...');
    try {
        const data = {
            version: "1.0",
            timestamp: Date.now(),
            employees: JSON.parse(localStorage.getItem('nlvz_employees') || '[]'),
            lubricationData: JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}'),
            lastCompleted: JSON.parse(localStorage.getItem('lubrication_last_v28') || '{}'),
            shiftClosed: JSON.parse(localStorage.getItem('lubrication_closed_v27') || '{}'),
            servoData: JSON.parse(localStorage.getItem('servoChecks') || '[]')
        };
        let sha = null;
        try {
            const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}`, {
                headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (getResponse.ok) { const fileData = await getResponse.json(); sha = fileData.sha; }
        } catch (e) { console.log('Файл не существует, будет создан новый'); }
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: `Синхронизация данных ${new Date().toLocaleString()}`, content: content, sha: sha, branch: GITHUB_CONFIG.BRANCH })
        });
        if (response.ok) showNotification('✅ Данные сохранены в облако!', 'success');
        else { const error = await response.json(); throw new Error(error.message); }
    } catch (error) { console.error('Ошибка:', error); showNotification('❌ Ошибка сохранения: ' + error.message, 'error'); }
    finally { hideLoading(); }
}

// Ручная загрузка из GitHub
async function syncFromGitHub() {
    showLoading('Загружаем из облака...');
    try {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/${GITHUB_CONFIG.FILE_PATH}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (data.lubricationData) localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
        if (data.servoData) localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
        if (data.employees) localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
        if (data.lastCompleted) localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
        if (data.shiftClosed) localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
        showNotification('✅ Данные загружены! Обновите страницу', 'success');
        setTimeout(() => { if (confirm('Данные загружены. Обновить страницу?')) location.reload(); }, 500);
    } catch (error) { console.error('Ошибка:', error); showNotification('❌ Ошибка загрузки: ' + error.message, 'error'); }
    finally { hideLoading(); }
}

function showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.style.cssText = `position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#f39c12'}; color: white; padding: 12px 20px; border-radius: 8px; z-index: 10001; font-size: 14px; animation: fadeInOut 3s;`;
    notif.innerHTML = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

function showLoading(text) {
    let loader = document.getElementById('githubLoader');
    if (!loader) {
        loader = document.createElement('div');
        loader.id = 'githubLoader';
        loader.style.cssText = `position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 40px; border-radius: 10px; z-index: 10000; font-size: 16px;`;
        document.body.appendChild(loader);
    }
    loader.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
    loader.style.display = 'block';
}

function hideLoading() { const loader = document.getElementById('githubLoader'); if (loader) loader.style.display = 'none'; }

// Запуск автосинхронизации
window.addEventListener('load', () => { setTimeout(autoLoadFromGitHub, 1000); });
</script>

    <button onclick="syncFromGitHub()" style="background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fab fa-github"></i> Обновить из облака</button>
</div>
