    <script>
        // Обновление даты
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ru-RU');

        const apps = {
            portal: { name: 'Главный портал', file: 'portal_main.html' },
            lubrication: { name: 'График смазки', file: 'График-смазки7.html' },
            servo: { name: 'Диагностика сервоприводов', file: 'Диагностика серво двигателей.html' }
        };

        let currentApp = 'portal';
        let loadingTimeout = null;

        function switchApp(appId) {
            if (!apps[appId]) return;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${appId.charAt(0).toUpperCase() + appId.slice(1)}`).classList.add('active');
            const container = document.getElementById('iframeContainer');
            container.classList.add('loading');
            if (loadingTimeout) clearTimeout(loadingTimeout);
            loadingTimeout = setTimeout(() => container.classList.remove('loading'), 1000);
            document.getElementById('appFrame').src = apps[appId].file;
            document.getElementById('statusText').textContent = `Активно: ${apps[appId].name}`;
            currentApp = appId;
        }

        document.getElementById('appFrame').addEventListener('load', () => {
            const container = document.getElementById('iframeContainer');
            if (container.classList.contains('loading')) setTimeout(() => container.classList.remove('loading'), 500);
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'lubrication_data_updated' || event.key === 'servo_data_updated') {
                document.getElementById('statusText').textContent = 'Данные обновлены';
                setTimeout(() => document.getElementById('statusText').textContent = `Активно: ${apps[currentApp].name}`, 3000);
            }
        });

        function checkFiles() {
            ['portal_main.html', 'График-смазки7.html', 'Диагностика серво двигателей.html'].forEach(file => {
                fetch(file).catch(() => console.warn(`⚠️ Файл ${file} недоступен`));
            });
        }
        window.addEventListener('load', () => { checkFiles(); document.getElementById('statusText').textContent = `Активно: ${apps.portal.name}`; });
    </script>

    <!-- GitHub Синхронизация -->
    <script>
    const GITHUB_CONFIG = {
        OWNER: 'alexandr-1526',
        REPO: 'nlvz-portal',
        FILE_PATH: 'db_portal.json',
        BRANCH: 'main',
        TOKEN: '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'
    };

    // Автозагрузка данных при открытии страницы (без вопроса на обновление)
    async function autoLoadFromGitHub() {
        console.log('🔄 Автоматическая загрузка данных из GitHub...');
        try {
            const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/${GITHUB_CONFIG.FILE_PATH}`;
            const response = await fetch(url);
            if (!response.ok) {
                if (response.status === 404) console.log('ℹ️ Файл db_portal.json ещё не создан');
                else throw new Error(`HTTP ${response.status}`);
                return;
            }
            const data = await response.json();
            
            let changed = false;
            if (data.lubricationData && JSON.stringify(data.lubricationData) !== localStorage.getItem('lubrication_history_v28')) {
                localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
                changed = true;
            }
            if (data.servoData && JSON.stringify(data.servoData) !== localStorage.getItem('servoChecks')) {
                localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
                changed = true;
            }
            if (data.employees && JSON.stringify(data.employees) !== localStorage.getItem('nlvz_employees')) {
                localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
                changed = true;
            }
            if (data.lastCompleted && JSON.stringify(data.lastCompleted) !== localStorage.getItem('lubrication_last_v28')) {
                localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
                changed = true;
            }
            if (data.shiftClosed && JSON.stringify(data.shiftClosed) !== localStorage.getItem('lubrication_closed_v27')) {
                localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
                changed = true;
            }
            
            if (changed) {
                console.log('✅ Данные загружены из GitHub');
                showNotification('✅ Данные обновлены из облака', 'success');
                if (typeof analyzeWithAI === 'function') analyzeWithAI();
            } else {
                console.log('ℹ️ Данные актуальны');
            }
        } catch (error) {
            console.error('❌ Ошибка автосинхронизации:', error);
            showNotification('⚠️ Не удалось загрузить данные из облака', 'warning');
        }
    }

    async function syncToGitHub() {
        showLoading('Сохраняем в облако...');
        try {
            const data = {
                version: "1.0",
                timestamp: Date.now(),
                employees: JSON.parse(localStorage.getItem('nlvz_employees') || '[]'),
                lubricationData: JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}'),
                lastCompleted: JSON.parse(localStorage.getItem('lubrication_last_v28') || '{}'),
                shiftClosed: JSON.parse(localStorage.getItem('lubrication_closed_v27') || '{}'),
                servoData: JSON.parse(localStorage.getItem('servoChecks') || '[]')
            };
            let sha = null;
            try {
                const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (getResponse.ok) { const fileData = await getResponse.json(); sha = fileData.sha; }
            } catch (e) { console.log('Файл не существует, будет создан новый'); }
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${GITHUB_CONFIG.FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ message: `Синхронизация данных ${new Date().toLocaleString()}`, content: content, sha: sha, branch: GITHUB_CONFIG.BRANCH })
            });
            if (response.ok) showNotification('✅ Данные сохранены в облако!', 'success');
            else { const error = await response.json(); throw new Error(error.message); }
        } catch (error) { console.error('Ошибка:', error); showNotification('❌ Ошибка сохранения: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    async function syncFromGitHub() {
        showLoading('Загружаем из облака...');
        try {
            const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/${GITHUB_CONFIG.FILE_PATH}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.lubricationData) localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
            if (data.servoData) localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
            if (data.employees) localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
            if (data.lastCompleted) localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
            if (data.shiftClosed) localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
            showNotification('✅ Данные загружены! Обновите страницу', 'success');
            setTimeout(() => location.reload(), 1000);
        } catch (error) { console.error('Ошибка:', error); showNotification('❌ Ошибка загрузки: ' + error.message, 'error'); }
        finally { hideLoading(); }
    }

    function showNotification(message, type = 'info') {
        const notif = document.createElement('div');
        notif.style.cssText = `position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#f39c12'}; color: white; padding: 12px 20px; border-radius: 8px; z-index: 10001; font-size: 14px; animation: fadeOut 3s;`;
        notif.innerHTML = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    function showLoading(text) {
        let loader = document.getElementById('githubLoader');
        if (!loader) {
            loader = document.createElement('div');
            loader.id = 'githubLoader';
            loader.style.cssText = `position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 40px; border-radius: 10px; z-index: 10000; font-size: 16px;`;
            document.body.appendChild(loader);
        }
        loader.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
        loader.style.display = 'block';
    }

    function hideLoading() { const loader = document.getElementById('githubLoader'); if (loader) loader.style.display = 'none'; }

    // Запуск автосинхронизации через 2 секунды после загрузки страницы
    window.addEventListener('load', () => { setTimeout(autoLoadFromGitHub, 2000); });
    </script>

        .ai-badge { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; font-weight: bold; animation: pulse-badge 2s infinite; }
        @keyframes pulse-badge { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .urgent-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 10000; animation: slideDown 0.5s; box-shadow: 0 5px 20px rgba(231, 76, 60, 0.5); }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
        @media (max-width: 768px) { .ai-widget { width: 280px; bottom: 10px; right: 10px; } .urgent-alert { width: 90%; font-size: 14px; padding: 12px 20px; } }
    </style>

    <script>
        // AI-виджет функции
        let aiWidgetMinimized = localStorage.getItem('aiWidgetMinimized') === 'true';
        document.addEventListener('DOMContentLoaded', function() { createAIWidget(); setTimeout(analyzeWithAI, 1500); setupReminders(); });
        function createAIWidget() { const widget = document.getElementById('aiWidget'); if (aiWidgetMinimized) widget.classList.add('minimized'); const savedTheme = localStorage.getItem('aiWidgetTheme'); if (savedTheme === 'dark') widget.classList.add('dark-theme'); }
        function toggleAIWidget() { const widget = document.getElementById('aiWidget'); widget.classList.toggle('minimized'); localStorage.setItem('aiWidgetMinimized', widget.classList.contains('minimized')); if (!widget.classList.contains('minimized')) analyzeWithAI(); }
        function toggleWidgetTheme() { const widget = document.getElementById('aiWidget'); widget.classList.toggle('dark-theme'); localStorage.setItem('aiWidgetTheme', widget.classList.contains('dark-theme') ? 'dark' : 'light'); }

        function analyzeMissedOperations() {
            const lubeData = localStorage.getItem('lubrication_history_v28');
            if (!lubeData) return { total: 0, byEmployee: {}, lastWeek: 0 };
            try {
                const shifts = JSON.parse(lubeData);
                const missed = { total: 0, byEmployee: {}, lastWeek: 0 };
                const today = new Date();
                const weekAgo = new Date(today.setDate(today.getDate() - 7)).toISOString().split('T')[0];
                Object.entries(shifts).forEach(([key, shift]) => {
                    if (!shift.completed || !shift.employee) return;
                    const total = shift.visiblePoints?.length || 0;
                    const completed = shift.completed.length || 0;
                    const missedCount = total - completed;
                    if (missedCount > 0) {
                        missed.total += missedCount;
                        missed.byEmployee[shift.employee] = (missed.byEmployee[shift.employee] || 0) + missedCount;
                        const [date] = key.split('_');
                        if (date >= weekAgo) missed.lastWeek += missedCount;
                    }
                });
                return missed;
            } catch (e) { return { total: 0, byEmployee: {}, lastWeek: 0 }; }
        }

        function getEmployeeRatings() {
            const missed = analyzeMissedOperations();
            const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
            const completed = {};
            Object.values(lubeData).forEach(shift => { if (shift.employee && shift.completed) completed[shift.employee] = (completed[shift.employee] || 0) + shift.completed.length; });
            const ratings = [];
            const allEmployees = new Set([...Object.keys(missed.byEmployee), ...Object.keys(completed)]);
            allEmployees.forEach(name => {
                const m = missed.byEmployee[name] || 0;
                const c = completed[name] || 0;
                const total = m + c;
                ratings.push({ name: name, missed: m, completed: c, efficiency: total > 0 ? Math.round((c / total) * 100) : 0 });
            });
            return ratings.sort((a, b) => b.efficiency - a.efficiency);
        }

        function getTomorrowPrediction() {
            const missed = analyzeMissedOperations();
            const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
            const last7Days = [];
            for (let i = 1; i <= 7; i++) {
                const date = new Date(); date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                let dayMissed = 0;
                Object.entries(lubeData).forEach(([key, shift]) => {
                    if (key.startsWith(dateStr) && shift.completed) {
                        const total = shift.visiblePoints?.length || 0;
                        const completed = shift.completed.length || 0;
                        dayMissed += (total - completed);
                    }
                });
                last7Days.push(dayMissed);
            }
            const avgMissed = last7Days.reduce((a, b) => a + b, 0) / last7Days.length;
            const trend = avgMissed > missed.total ? 'растёт' : 'снижается';
            let recommendation = avgMissed > 80 ? '🔴 Критический тренд! Нужно срочно действовать!' : (avgMissed > 50 ? '🟡 Требуется внимание руководства' : '🟢 Ситуация стабилизируется');
            return { predictedMissed: Math.round(avgMissed), trend: trend, recommendation: recommendation };
        }

        function showUrgentAlerts(analysis) {
            const missed = analyzeMissedOperations();
            document.querySelectorAll('.urgent-alert').forEach(el => el.remove());
            if (missed.total > 80) {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'urgent-alert';
                alertDiv.innerHTML = `🔴 КРИТИЧЕСКАЯ СИТУАЦИЯ! ${missed.total} пропусков!<button onclick="this.parentElement.remove()" style="margin-left:20px;background:none;border:none;color:white;cursor:pointer;font-size:18px;">✖</button>`;
                document.body.appendChild(alertDiv);
                setTimeout(() => alertDiv.remove(), 10000);
            }
        }

        function setupReminders() {
            setInterval(() => {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const today = now.toISOString().split('T')[0];
                const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
                const hasTodayData = lubeData[`${today}_shift1`] || lubeData[`${today}_shift2`];
                if (hours === 19 && minutes === 55 && !hasTodayData) {
                    const reminder = document.createElement('div');
                    reminder.className = 'urgent-alert';
                    reminder.style.background = '#f39c12';
                    reminder.innerHTML = `⏰ Напоминание: через 5 минут смена 2! Внесите данные за сегодня<button onclick="this.parentElement.remove()" style="margin-left:20px;background:none;border:none;color:white;cursor:pointer;">✖</button>`;
                    document.body.appendChild(reminder);
                    setTimeout(() => reminder.remove(), 10000);
                }
                if (hours === 8 && minutes === 5 && !hasTodayData) {
                    const reminder = document.createElement('div');
                    reminder.className = 'urgent-alert';
                    reminder.style.background = '#3498db';
                    reminder.innerHTML = `🌅 Доброе утро! Не забудьте внести данные по смазке за сегодня<button onclick="this.parentElement.remove()" style="margin-left:20px;background:none;border:none;color:white;cursor:pointer;">✖</button>`;
                    document.body.appendChild(reminder);
                    setTimeout(() => reminder.remove(), 10000);
                }
            }, 60000);
        }

        function analyzeWithAI() {
            const loading = document.getElementById('aiLoading');
            const content = document.getElementById('aiContent');
            const statusDot = document.getElementById('aiStatusDot');
            loading.style.display = 'flex';
            content.style.display = 'none';
            setTimeout(() => {
                const analysis = collectDataForAI();
                displayAIAnalysis(analysis);
                updateBadge(analysis);
                showUrgentAlerts(analysis);
                statusDot.className = analysis.critical > 0 ? 'ai-status red' : (analysis.warning > 0 ? 'ai-status yellow' : 'ai-status green');
                loading.style.display = 'none';
                content.style.display = 'block';
            }, 500);
        }

        function collectDataForAI() {
            const analysis = { critical: 0, warning: 0, info: 0, messages: [], tips: [], timestamp: new Date().toLocaleString() };
            try {
                const servoData = localStorage.getItem('servoChecks');
                if (servoData) {
                    const checks = JSON.parse(servoData);
                    if (checks.length > 0) {
                        const lastCheck = checks[0];
                        const daysSince = Math.floor((Date.now() - new Date(lastCheck.created).getTime()) / 86400000);
                        if (daysSince > 7) { analysis.warning++; analysis.messages.push({ type: 'warning', text: `⚠️ Давно не проверяли сервоприводы (${daysSince} дней)` }); }
                        if (lastCheck.servos) {
                            const criticalServos = lastCheck.servos.filter(s => s.status === 'critical');
                            if (criticalServos.length > 0) { analysis.critical += criticalServos.length; analysis.messages.push({ type: 'critical', text: `🔴 ${criticalServos.length} сервоприводов в критическом состоянии!` }); }
                        }
                    }
                }
            } catch (e) {}
            try {
                const lubeData = localStorage.getItem('lubrication_history_v28');
                if (lubeData) {
                    const shifts = JSON.parse(lubeData);
                    const today = new Date().toISOString().split('T')[0];
                    if (!shifts[`${today}_shift1`] && !shifts[`${today}_shift2`]) { analysis.warning++; analysis.messages.push({ type: 'warning', text: '⚠️ Сегодня ещё не внесены данные по смазке' }); }
                    const missedAnalysis = analyzeMissedOperations();
                    if (missedAnalysis.total > 0) {
                        analysis.info++; analysis.messages.push({ type: 'info', text: `📊 Всего пропущено: ${missedAnalysis.total}` });
                        if (missedAnalysis.lastWeek > 0) analysis.messages.push({ type: 'info', text: `📅 За неделю: ${missedAnalysis.lastWeek}` });
                        const topOffenders = Object.entries(missedAnalysis.byEmployee).sort((a, b) => b[1] - a[1]).slice(0, 2);
                        topOffenders.forEach(([name, count]) => { const shortName = name.split(' ').slice(0, 2).join(' '); analysis.messages.push({ type: 'warning', text: `👤 ${shortName}: ${count} пропусков` }); });
                    }
                    const prediction = getTomorrowPrediction();
                    analysis.messages.push({ type: 'info', text: `🔮 Прогноз на завтра: ${prediction.predictedMissed} (${prediction.trend})` });
                    const ratings = getEmployeeRatings();
                    if (ratings.length > 0) {
                        let ratingText = '🏆 Доска почёта:\n';
                        ratings.slice(0, 3).forEach((r, i) => { const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'; const name = r.name.split(' ')[0]; ratingText += `${medal} ${name}: ${r.efficiency}%\n`; });
                        analysis.messages.push({ type: 'success', text: ratingText });
                    }
                }
            } catch (e) {}
            try {
                const employees = localStorage.getItem('nlvz_employees');
                if (employees) { const empList = JSON.parse(employees); analysis.info++; analysis.messages.push({ type: 'success', text: `👥 Активных сотрудников: ${empList.length}` }); }
            } catch (e) {}
            const prediction = getTomorrowPrediction();
            analysis.tips.push(prediction.recommendation);
            if (analysis.critical > 0) analysis.tips.push('🚨 Немедленно проверьте критичные сервоприводы!');
            return analysis;
        }

        function displayAIAnalysis(analysis) {
            const content = document.getElementById('aiContent');
            let html = `<div style="font-size:12px;color:#a1bbd0;margin-bottom:10px;">🕐 ${analysis.timestamp}</div>`;
            analysis.messages.forEach(msg => { html += `<div class="ai-message ${msg.type}">${msg.text}</div>`; });
            if (analysis.tips.length > 0) html += `<div class="ai-tip">💡 <strong>Совет:</strong> ${analysis.tips[0]}</div>`;
            if (analysis.messages.length === 0) html += `<div class="ai-message success">✅ Все системы работают нормально. Отличная работа!</div>`;
            html += `<div style="display:flex;gap:10px;margin-top:15px;font-size:12px;color:#a1bbd0;"><span>🔴 ${analysis.critical}</span><span>🟡 ${analysis.warning}</span><span>🔵 ${analysis.info}</span></div>`;
            content.innerHTML = html;
        }

        function updateBadge(analysis) {
            const totalIssues = analysis.critical + analysis.warning;
            const header = document.querySelector('.ai-header');
            if (!header) return;
            let badge = document.querySelector('.ai-badge');
            if (!badge && totalIssues > 0) { badge = document.createElement('span'); badge.className = 'ai-badge'; header.appendChild(badge); }
            if (badge) badge.style.display = totalIssues > 0 ? 'inline' : 'none';
            if (badge && totalIssues > 0) badge.textContent = totalIssues > 9 ? '9+' : totalIssues;
        }

        function refreshAIAnalysis() { analyzeWithAI(); }

        async function sendYandexReport() {
            const loading = document.getElementById('aiLoading');
            loading.style.display = 'flex';
            try {
                const missed = analyzeMissedOperations();
                const prediction = getTomorrowPrediction();
                let employeeList = '';
                Object.entries(missed.byEmployee).sort((a, b) => b[1] - a[1]).slice(0, 10).forEach(([name, count]) => {
                    employeeList += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e0e0e0;"><span style="font-weight:500;">${name}</span><span style="background:#e74c3c;color:white;padding:2px 12px;border-radius:20px;font-size:12px;">${count} проп.</span></div>`;
                });
                const templateParams = {
                    to_email: 'nlzvopvz@yandex.ru',
                    employee: 'Сотрудник',
                    date: new Date().toLocaleDateString('ru-RU'),
                    time: new Date().toLocaleTimeString('ru-RU'),
                    total_missed: missed.total,
                    week_missed: missed.lastWeek,
                    employees_count: Object.keys(missed.byEmployee).length || 1,
                    employee_list: employeeList,
                    prediction: prediction.recommendation
                };
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                alert(`✅ Отчёт отправлен!\n📊 Пропусков: ${missed.total}\n📅 За неделю: ${missed.lastWeek}\n🔮 Прогноз: ${prediction.recommendation}`);
            } catch (error) { console.error(error); alert('❌ Ошибка при отправке'); }
            finally { loading.style.display = 'none'; }
        }

        function addAIToNav() {
            const navPanel = document.querySelector('.nav-panel');
            if (navPanel) {
                const aiNavBtn = document.createElement('button');
                aiNavBtn.className = 'nav-btn';
                aiNavBtn.innerHTML = '<i class="fas fa-robot"></i> AI-анализ';
                aiNavBtn.onclick = function() { if (document.getElementById('aiWidget').classList.contains('minimized')) toggleAIWidget(); analyzeWithAI(); };
                navPanel.querySelector('.nav-buttons').appendChild(aiNavBtn);
            }
        }
        window.addEventListener('load', addAIToNav);
        window.sendYandexReport = sendYandexReport;
        window.refreshAIAnalysis = refreshAIAnalysis;
    </script>
</body>
</html>
