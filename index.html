<script>
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ru-RU');

    const apps = {
        portal: { name: 'Главный портал', file: 'portal_main.html' },
        lubrication: { name: 'График смазки', file: 'График-смазки7.html' },
        servo: { name: 'Диагностика сервоприводов', file: 'Диагностика серво двигателей.html' }
    };

    let currentApp = 'portal';
    let loadingTimeout = null;

    function switchApp(appId) {
        if (!apps[appId]) return;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn${appId.charAt(0).toUpperCase() + appId.slice(1)}`).classList.add('active');
        const container = document.getElementById('iframeContainer');
        container.classList.add('loading');
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => container.classList.remove('loading'), 1000);
        document.getElementById('appFrame').src = apps[appId].file;
        document.getElementById('statusText').textContent = `Активно: ${apps[appId].name}`;
        currentApp = appId;
    }

    document.getElementById('appFrame').addEventListener('load', () => {
        const container = document.getElementById('iframeContainer');
        if (container.classList.contains('loading')) setTimeout(() => container.classList.remove('loading'), 500);
    });

    window.addEventListener('storage', (event) => {
        if (event.key === 'lubrication_data_updated' || event.key === 'servo_data_updated') {
            document.getElementById('statusText').textContent = 'Данные обновлены';
            setTimeout(() => document.getElementById('statusText').textContent = `Активно: ${apps[currentApp].name}`, 3000);
        }
    });

    function checkFiles() {
        ['portal_main.html', 'График-смазки7.html', 'Диагностика серво двигателей.html'].forEach(file => {
            fetch(file).catch(() => console.warn(`⚠️ Файл ${file} недоступен`));
        });
    }
    window.addEventListener('load', () => { checkFiles(); document.getElementById('statusText').textContent = `Активно: ${apps.portal.name}`; });
</script>

<!-- Яндекс.Диск синхронизация -->
<script>
// НАСТРОЙКИ
const YANDEX_CONFIG = {
    FILE_ID: 'kPteUCujX2DL7w',
    EDIT_URL: 'https://disk.yandex.ru/d/kPteUCujX2DL7w',
    // Прямая ссылка для скачивания (нужно получить вручную)
    // 1. Откройте файл на Диске
    // 2. Нажмите "Скачать"
    // 3. Скопируйте ссылку из адресной строки
    DOWNLOAD_URL: 'https://downloader.disk.yandex.ru/disk/...' // заполните позже
};

// Загрузка с Яндекс.Диска
async function loadFromYandexDisk() {
    console.log('📥 Загрузка с Яндекс.Диска...');
    try {
        // Если есть прямая ссылка — используем её
        if (YANDEX_CONFIG.DOWNLOAD_URL && YANDEX_CONFIG.DOWNLOAD_URL.includes('downloader')) {
            const response = await fetch(YANDEX_CONFIG.DOWNLOAD_URL);
            if (response.ok) {
                const data = await response.json();
                console.log('✅ Данные загружены с Яндекс.Диска');
                return { success: true, data: data };
            }
        }
        // Иначе открываем страницу для ручной загрузки
        console.log('🔗 Откройте ссылку для загрузки вручную:', YANDEX_CONFIG.EDIT_URL);
        return { success: false, needManual: true };
    } catch (e) {
        console.error('❌ Ошибка загрузки:', e);
        return { success: false };
    }
}

// Сохранение на Яндекс.Диск (с копированием в буфер)
async function saveToYandexDisk(data) {
    console.log('☁️ Сохранение на Яндекс.Диск...');
    
    const jsonStr = JSON.stringify(data, null, 2);
    
    try {
        await navigator.clipboard.writeText(jsonStr);
        
        const confirmSave = confirm(
            `📋 Данные скопированы в буфер обмена!\n\n` +
            `1. Нажмите OK, чтобы открыть Яндекс.Диск\n` +
            `2. Откройте файл db_portal.json\n` +
            `3. Вставьте данные (Ctrl+V) и нажмите Сохранить\n\n` +
            `✅ После этого другие ПК загрузят данные автоматически`
        );
        
        if (confirmSave) {
            window.open(YANDEX_CONFIG.EDIT_URL, '_blank');
        }
        
        showNotification('✅ Данные готовы для сохранения на Яндекс.Диск', 'success');
        return { success: true };
        
    } catch (error) {
        console.error('Ошибка:', error);
        showNotification('❌ Ошибка копирования', 'error');
        return { success: false };
    }
}

// Основная функция автосохранения
async function autoSaveToCloud() {
    console.log('☁️ Автосохранение на Яндекс.Диск...');
    
    const data = {
        version: "1.0",
        timestamp: Date.now(),
        employees: JSON.parse(localStorage.getItem('nlvz_employees') || '[]'),
        lubricationData: JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}'),
        lastCompleted: JSON.parse(localStorage.getItem('lubrication_last_v28') || '{}'),
        shiftClosed: JSON.parse(localStorage.getItem('lubrication_closed_v27') || '{}'),
        servoData: JSON.parse(localStorage.getItem('servoChecks') || '[]')
    };
    
    await saveToYandexDisk(data);
}

// Загрузка данных при старте
async function autoLoadFromCloud() {
    console.log('🔄 Автоматическая загрузка данных...');
    showLoading('Загрузка данных с Яндекс.Диска...');
    
    const result = await loadFromYandexDisk();
    
    if (result.success && result.data) {
        let changed = false;
        if (result.data.lubricationData && JSON.stringify(result.data.lubricationData) !== localStorage.getItem('lubrication_history_v28')) {
            localStorage.setItem('lubrication_history_v28', JSON.stringify(result.data.lubricationData));
            changed = true;
        }
        if (result.data.servoData && JSON.stringify(result.data.servoData) !== localStorage.getItem('servoChecks')) {
            localStorage.setItem('servoChecks', JSON.stringify(result.data.servoData));
            changed = true;
        }
        if (result.data.employees && JSON.stringify(result.data.employees) !== localStorage.getItem('nlvz_employees')) {
            localStorage.setItem('nlvz_employees', JSON.stringify(result.data.employees));
            changed = true;
        }
        if (result.data.lastCompleted && JSON.stringify(result.data.lastCompleted) !== localStorage.getItem('lubrication_last_v28')) {
            localStorage.setItem('lubrication_last_v28', JSON.stringify(result.data.lastCompleted));
            changed = true;
        }
        if (result.data.shiftClosed && JSON.stringify(result.data.shiftClosed) !== localStorage.getItem('lubrication_closed_v27')) {
            localStorage.setItem('lubrication_closed_v27', JSON.stringify(result.data.shiftClosed));
            changed = true;
        }
        
        if (changed) {
            console.log('✅ Данные загружены с Яндекс.Диска');
            showNotification('✅ Данные обновлены с Яндекс.Диска', 'success');
            if (typeof analyzeWithAI === 'function') analyzeWithAI();
        } else {
            console.log('ℹ️ Данные актуальны');
        }
    } else if (result.needManual) {
        showNotification('⚠️ Для загрузки откройте файл на Яндекс.Диске', 'info');
        if (confirm('Открыть Яндекс.Диск для ручной загрузки?')) {
            window.open(YANDEX_CONFIG.EDIT_URL, '_blank');
        }
    } else {
        showNotification('⚠️ Не удалось загрузить данные', 'warning');
    }
    
    hideLoading();
}

// Ручная загрузка
async function syncFromCloud() {
    showLoading('Загружаем с Яндекс.Диска...');
    await autoLoadFromCloud();
    hideLoading();
}

// Экспорт в файл
function exportToFile() {
    const data = {
        version: "1.0",
        timestamp: Date.now(),
        employees: JSON.parse(localStorage.getItem('nlvz_employees') || '[]'),
        lubricationData: JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}'),
        lastCompleted: JSON.parse(localStorage.getItem('lubrication_last_v28') || '{}'),
        shiftClosed: JSON.parse(localStorage.getItem('lubrication_closed_v27') || '{}'),
        servoData: JSON.parse(localStorage.getItem('servoChecks') || '[]')
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `db_portal_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification('✅ Данные экспортированы в файл', 'success');
}

// Импорт из файла
function importFromFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.lubricationData) localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
                if (data.servoData) localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
                if (data.employees) localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
                if (data.lastCompleted) localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
                if (data.shiftClosed) localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
                showNotification('✅ Данные импортированы! Обновите страницу', 'success');
                setTimeout(() => location.reload(), 1000);
            } catch (error) {
                showNotification('❌ Ошибка импорта', 'error');
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// Вспомогательные функции
function showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.style.cssText = `position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#f39c12'}; color: white; padding: 12px 20px; border-radius: 8px; z-index: 10001; font-size: 14px;`;
    notif.innerHTML = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

function showLoading(text) {
    let loader = document.getElementById('cloudLoader');
    if (!loader) {
        loader = document.createElement('div');
        loader.id = 'cloudLoader';
        loader.style.cssText = `position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 40px; border-radius: 10px; z-index: 10000; font-size: 16px;`;
        document.body.appendChild(loader);
    }
    loader.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
    loader.style.display = 'block';
}

function hideLoading() {
    const loader = document.getElementById('cloudLoader');
    if (loader) loader.style.display = 'none';
}

// Кнопки управления
function showCloudButtons() {
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = `position: fixed; bottom: 20px; left: 20px; z-index: 999; display: flex; gap: 10px; flex-wrap: wrap;`;
    btnContainer.innerHTML = `
        <button onclick="autoSaveToCloud()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-cloud-upload-alt"></i> Сохранить на Диск</button>
        <button onclick="syncFromCloud()" style="background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-cloud-download-alt"></i> Загрузить с Диска</button>
        <button onclick="exportToFile()" style="background: #9b59b6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-download"></i> Экспорт в файл</button>
        <button onclick="importFromFile()" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-upload"></i> Импорт из файла</button>
    `;
    document.body.appendChild(btnContainer);
}

// Запуск при загрузке
window.addEventListener('load', () => {
    setTimeout(autoLoadFromCloud, 2000);
    showCloudButtons();
});

// Экспорт функций в глобальную область
window.autoSaveToCloud = autoSaveToCloud;
window.syncFromCloud = syncFromCloud;
window.exportToFile = exportToFile;
window.importFromFile = importFromFile;
</script>
