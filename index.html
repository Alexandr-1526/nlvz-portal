<script>
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ru-RU');

    const apps = {
        portal: { name: 'Главный портал', file: 'portal_main.html' },
        lubrication: { name: 'График смазки', file: 'График-смазки7.html' },
        servo: { name: 'Диагностика сервоприводов', file: 'Диагностика серво двигателей.html' }
    };

    let currentApp = 'portal';
    let loadingTimeout = null;

    function switchApp(appId) {
        if (!apps[appId]) return;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn${appId.charAt(0).toUpperCase() + appId.slice(1)}`).classList.add('active');
        const container = document.getElementById('iframeContainer');
        container.classList.add('loading');
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => container.classList.remove('loading'), 1000);
        document.getElementById('appFrame').src = apps[appId].file;
        document.getElementById('statusText').textContent = `Активно: ${apps[appId].name}`;
        currentApp = appId;
    }

    document.getElementById('appFrame').addEventListener('load', () => {
        const container = document.getElementById('iframeContainer');
        if (container.classList.contains('loading')) setTimeout(() => container.classList.remove('loading'), 500);
    });

    window.addEventListener('storage', (event) => {
        if (event.key === 'lubrication_data_updated' || event.key === 'servo_data_updated') {
            document.getElementById('statusText').textContent = 'Данные обновлены';
            setTimeout(() => document.getElementById('statusText').textContent = `Активно: ${apps[currentApp].name}`, 3000);
        }
    });

    function checkFiles() {
        ['portal_main.html', 'График-смазки7.html', 'Диагностика серво двигателей.html'].forEach(file => {
            fetch(file).catch(() => console.warn(`⚠️ Файл ${file} недоступен`));
        });
    }
    window.addEventListener('load', () => { checkFiles(); document.getElementById('statusText').textContent = `Активно: ${apps.portal.name}`; });
</script>

<!-- Экспорт/Импорт и синхронизация -->
<script>
// Функция экспорта всех данных в JSON файл
function exportAllData() {
    const data = {
        version: "1.0",
        exportDate: new Date().toISOString(),
        employees: JSON.parse(localStorage.getItem('nlvz_employees') || '[]'),
        lubricationData: JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}'),
        servoData: JSON.parse(localStorage.getItem('servoChecks') || '[]'),
        lastCompleted: JSON.parse(localStorage.getItem('lubrication_last_v28') || '{}'),
        shiftClosed: JSON.parse(localStorage.getItem('lubrication_closed_v27') || '{}')
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `db_portal_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification('✅ Данные экспортированы в JSON файл', 'success');
}

// Функция импорта данных из JSON файла
function importAllData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                let restored = false;
                
                // Обработка данных из портала (прямая структура)
                if (data.lubricationData || data.servoData || data.employees) {
                    if (data.employees && Array.isArray(data.employees)) {
                        localStorage.setItem('nlvz_employees', JSON.stringify(data.employees));
                        restored = true;
                    }
                    if (data.lubricationData) {
                        localStorage.setItem('lubrication_history_v28', JSON.stringify(data.lubricationData));
                        restored = true;
                    }
                    if (data.servoData) {
                        localStorage.setItem('servoChecks', JSON.stringify(data.servoData));
                        restored = true;
                    }
                    if (data.lastCompleted) {
                        localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
                        restored = true;
                    }
                    if (data.shiftClosed) {
                        localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
                        restored = true;
                    }
                }
                // Обработка данных из графика смазки (структура shifts)
                else if (data.shifts) {
                    localStorage.setItem('lubrication_history_v28', JSON.stringify(data.shifts));
                    if (data.lastCompleted) localStorage.setItem('lubrication_last_v28', JSON.stringify(data.lastCompleted));
                    if (data.shiftClosed) localStorage.setItem('lubrication_closed_v27', JSON.stringify(data.shiftClosed));
                    restored = true;
                }
                
                if (restored) {
                    // Отправляем события для обновления портала и календаря
                    localStorage.setItem('lubrication_data_updated', Date.now().toString());
                    localStorage.setItem('servo_data_updated', Date.now().toString());
                    
                    showNotification('✅ Данные успешно импортированы! Обновите страницу (F5)', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showNotification('❌ Неизвестный формат файла', 'error');
                }
            } catch (error) {
                console.error('Ошибка импорта:', error);
                showNotification('❌ Ошибка при чтении файла', 'error');
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// Функция синхронизации календаря (принудительная)
function syncCalendar() {
    const lubeData = localStorage.getItem('lubrication_history_v28');
    if (lubeData) {
        // Просто отправляем событие обновления
        localStorage.setItem('lubrication_data_updated', Date.now().toString());
        showNotification('🔄 Календарь синхронизирован', 'success');
    } else {
        showNotification('⚠️ Нет данных для синхронизации', 'warning');
    }
}

function showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.style.cssText = `position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#f39c12'}; color: white; padding: 12px 20px; border-radius: 8px; z-index: 10001; font-size: 14px;`;
    notif.innerHTML = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

// Создание кнопок управления
function addControlButtons() {
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = `position: fixed; bottom: 20px; left: 20px; z-index: 999; display: flex; gap: 10px; flex-wrap: wrap;`;
    btnContainer.innerHTML = `
        <button onclick="exportAllData()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-file-export"></i> Экспорт JSON</button>
        <button onclick="importAllData()" style="background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-file-import"></i> Импорт JSON</button>
        <button onclick="syncCalendar()" style="background: #9b59b6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;"><i class="fas fa-calendar-alt"></i> Синхр. календарь</button>
    `;
    document.body.appendChild(btnContainer);
}

window.addEventListener('load', () => {
    addControlButtons();
});

window.exportAllData = exportAllData;
window.importAllData = importAllData;
window.syncCalendar = syncCalendar;
</script>

<script>
    // AI-виджет функции
    let aiWidgetMinimized = localStorage.getItem('aiWidgetMinimized') === 'true';
    document.addEventListener('DOMContentLoaded', function() { createAIWidget(); setTimeout(analyzeWithAI, 1500); setupReminders(); });
    function createAIWidget() { const widget = document.getElementById('aiWidget'); if (aiWidgetMinimized) widget.classList.add('minimized'); const savedTheme = localStorage.getItem('aiWidgetTheme'); if (savedTheme === 'dark') widget.classList.add('dark-theme'); }
    function toggleAIWidget() { const widget = document.getElementById('aiWidget'); widget.classList.toggle('minimized'); localStorage.setItem('aiWidgetMinimized', widget.classList.contains('minimized')); if (!widget.classList.contains('minimized')) analyzeWithAI(); }
    function toggleWidgetTheme() { const widget = document.getElementById('aiWidget'); widget.classList.toggle('dark-theme'); localStorage.setItem('aiWidgetTheme', widget.classList.contains('dark-theme') ? 'dark' : 'light'); }

    function analyzeMissedOperations() {
        const lubeData = localStorage.getItem('lubrication_history_v28');
        if (!lubeData) return { total: 0, byEmployee: {}, lastWeek: 0 };
        try {
            const shifts = JSON.parse(lubeData);
            const missed = { total: 0, byEmployee: {}, lastWeek: 0 };
            const today = new Date();
            const weekAgo = new Date(today.setDate(today.getDate() - 7)).toISOString().split('T')[0];
            Object.entries(shifts).forEach(([key, shift]) => {
                if (!shift.completed || !shift.employee) return;
                const total = shift.visiblePoints?.length || 0;
                const completed = shift.completed.length || 0;
                const missedCount = total - completed;
                if (missedCount > 0) {
                    missed.total += missedCount;
                    missed.byEmployee[shift.employee] = (missed.byEmployee[shift.employee] || 0) + missedCount;
                    const [date] = key.split('_');
                    if (date >= weekAgo) missed.lastWeek += missedCount;
                }
            });
            return missed;
        } catch (e) { return { total: 0, byEmployee: {}, lastWeek: 0 }; }
    }

    function getEmployeeRatings() {
        const missed = analyzeMissedOperations();
        const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
        const completed = {};
        Object.values(lubeData).forEach(shift => { if (shift.employee && shift.completed) completed[shift.employee] = (completed[shift.employee] || 0) + shift.completed.length; });
        const ratings = [];
        const allEmployees = new Set([...Object.keys(missed.byEmployee), ...Object.keys(completed)]);
        allEmployees.forEach(name => {
            const m = missed.byEmployee[name] || 0;
            const c = completed[name] || 0;
            ratings.push({ name, missed: m, completed: c, efficiency: (m+c) > 0 ? Math.round((c/(m+c))*100) : 0 });
        });
        return ratings.sort((a,b) => b.efficiency - a.efficiency);
    }

    function getTomorrowPrediction() {
        const missed = analyzeMissedOperations();
        const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
        const last7Days = [];
        for (let i=1; i<=7; i++) {
            const date = new Date(); date.setDate(date.getDate()-i);
            const dateStr = date.toISOString().split('T')[0];
            let dayMissed = 0;
            Object.entries(lubeData).forEach(([key, shift]) => {
                if (key.startsWith(dateStr) && shift.completed) {
                    const total = shift.visiblePoints?.length || 0;
                    const completed = shift.completed.length || 0;
                    dayMissed += (total - completed);
                }
            });
            last7Days.push(dayMissed);
        }
        const avgMissed = last7Days.reduce((a,b)=>a+b,0)/7;
        const trend = avgMissed > missed.total ? 'растёт' : 'снижается';
        let rec = avgMissed > 80 ? '🔴 Критический тренд!' : (avgMissed > 50 ? '🟡 Требуется внимание' : '🟢 Ситуация стабилизируется');
        return { predictedMissed: Math.round(avgMissed), trend, recommendation: rec };
    }

    function analyzeWithAI() {
        const loading = document.getElementById('aiLoading');
        const content = document.getElementById('aiContent');
        const statusDot = document.getElementById('aiStatusDot');
        loading.style.display = 'flex';
        content.style.display = 'none';
        setTimeout(() => {
            const analysis = collectDataForAI();
            displayAIAnalysis(analysis);
            const total = analysis.critical + analysis.warning;
            statusDot.className = analysis.critical > 0 ? 'ai-status red' : (analysis.warning > 0 ? 'ai-status yellow' : 'ai-status green');
            loading.style.display = 'none';
            content.style.display = 'block';
        }, 500);
    }

    function collectDataForAI() {
        const analysis = { critical: 0, warning: 0, info: 0, messages: [], tips: [], timestamp: new Date().toLocaleString() };
        try {
            const servoData = localStorage.getItem('servoChecks');
            if (servoData) {
                const checks = JSON.parse(servoData);
                if (checks.length) {
                    const last = checks[0];
                    const days = Math.floor((Date.now()-new Date(last.created).getTime())/86400000);
                    if (days>7) { analysis.warning++; analysis.messages.push({ type:'warning', text:`⚠️ Давно не проверяли сервоприводы (${days} дней)` }); }
                    if (last.servos) {
                        const critical = last.servos.filter(s=>s.status==='critical');
                        if (critical.length) { analysis.critical+=critical.length; analysis.messages.push({ type:'critical', text:`🔴 ${critical.length} сервоприводов в критическом состоянии!` }); }
                    }
                }
            }
        } catch(e) {}
        try {
            const lubeData = localStorage.getItem('lubrication_history_v28');
            if (lubeData) {
                const shifts = JSON.parse(lubeData);
                const today = new Date().toISOString().split('T')[0];
                if (!shifts[`${today}_shift1`] && !shifts[`${today}_shift2`]) { analysis.warning++; analysis.messages.push({ type:'warning', text:'⚠️ Сегодня ещё не внесены данные по смазке' }); }
                const missed = analyzeMissedOperations();
                if (missed.total>0) {
                    analysis.info++; analysis.messages.push({ type:'info', text:`📊 Всего пропущено: ${missed.total}` });
                    if (missed.lastWeek>0) analysis.messages.push({ type:'info', text:`📅 За неделю: ${missed.lastWeek}` });
                    Object.entries(missed.byEmployee).sort((a,b)=>b[1]-a[1]).slice(0,2).forEach(([n,c]) => { analysis.messages.push({ type:'warning', text:`👤 ${n.split(' ').slice(0,2).join(' ')}: ${c} пропусков` }); });
                }
                const pred = getTomorrowPrediction();
                analysis.messages.push({ type:'info', text:`🔮 Прогноз на завтра: ${pred.predictedMissed} (${pred.trend})` });
                const ratings = getEmployeeRatings();
                if (ratings.length) {
                    let txt = '🏆 Доска почёта:\n';
                    ratings.slice(0,3).forEach((r,i) => { txt += `${i===0?'🥇':i===1?'🥈':'🥉'} ${r.name.split(' ')[0]}: ${r.efficiency}%\n`; });
                    analysis.messages.push({ type:'success', text:txt });
                }
            }
        } catch(e) {}
        try {
            const emp = localStorage.getItem('nlvz_employees');
            if (emp) { const list = JSON.parse(emp); analysis.info++; analysis.messages.push({ type:'success', text:`👥 Активных сотрудников: ${list.length}` }); }
        } catch(e) {}
        const pred = getTomorrowPrediction();
        analysis.tips.push(pred.recommendation);
        if (analysis.critical>0) analysis.tips.push('🚨 Немедленно проверьте критичные сервоприводы!');
        return analysis;
    }

    function displayAIAnalysis(analysis) {
        const content = document.getElementById('aiContent');
        let html = `<div style="font-size:12px;color:#a1bbd0;margin-bottom:10px;">🕐 ${analysis.timestamp}</div>`;
        analysis.messages.forEach(m => { html += `<div class="ai-message ${m.type}">${m.text}</div>`; });
        if (analysis.tips.length) html += `<div class="ai-tip">💡 <strong>Совет:</strong> ${analysis.tips[0]}</div>`;
        if (!analysis.messages.length) html += `<div class="ai-message success">✅ Все системы работают нормально. Отличная работа!</div>`;
        html += `<div style="display:flex;gap:10px;margin-top:15px;font-size:12px;color:#a1bbd0;"><span>🔴 ${analysis.critical}</span><span>🟡 ${analysis.warning}</span><span>🔵 ${analysis.info}</span></div>`;
        content.innerHTML = html;
    }

    function refreshAIAnalysis() { analyzeWithAI(); }

    async function sendYandexReport() {
        const loading = document.getElementById('aiLoading');
        loading.style.display = 'flex';
        try {
            const missed = analyzeMissedOperations();
            const pred = getTomorrowPrediction();
            let empList = '';
            Object.entries(missed.byEmployee).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([n,c]) => { empList += `<div style="display:flex;justify-content:space-between;padding:8px0;border-bottom:1px solid #e0e0e0;"><span>${n}</span><span style="background:#e74c3c;color:white;padding:2px12px;border-radius:20px;">${c} проп.</span></div>`; });
            await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                to_email: 'nlzvopvz@yandex.ru',
                employee: 'Сотрудник',
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString(),
                total_missed: missed.total,
                week_missed: missed.lastWeek,
                employees_count: Object.keys(missed.byEmployee).length || 1,
                employee_list: empList,
                prediction: pred.recommendation
            });
            alert(`✅ Отчёт отправлен!\n📊 Пропусков: ${missed.total}\n📅 За неделю: ${missed.lastWeek}\n🔮 Прогноз: ${pred.recommendation}`);
        } catch(e) { alert('❌ Ошибка при отправке'); } finally { loading.style.display = 'none'; }
    }

    function setupReminders() {
        setInterval(() => {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes();
            const today = now.toISOString().split('T')[0];
            const lube = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
            const has = lube[`${today}_shift1`] || lube[`${today}_shift2`];
            if (h===19 && m===55 && !has) alert('⏰ Напоминание: через 5 минут смена 2! Внесите данные за сегодня');
            if (h===8 && m===5 && !has) alert('🌅 Доброе утро! Не забудьте внести данные по смазке за сегодня');
        }, 60000);
    }

    function addAIToNav() {
        const navPanel = document.querySelector('.nav-panel');
        if (navPanel) {
            const aiNavBtn = document.createElement('button');
            aiNavBtn.className = 'nav-btn';
            aiNavBtn.innerHTML = '<i class="fas fa-robot"></i> AI-анализ';
            aiNavBtn.onclick = function() { if (document.getElementById('aiWidget').classList.contains('minimized')) toggleAIWidget(); analyzeWithAI(); };
            navPanel.querySelector('.nav-buttons').appendChild(aiNavBtn);
        }
    }
    window.addEventListener('load', addAIToNav);
    window.sendYandexReport = sendYandexReport;
    window.refreshAIAnalysis = refreshAIAnalysis;
</script>
</body>
</html>
