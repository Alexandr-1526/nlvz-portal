    <script>
        // Конфигурация приложений
        const apps = {
            portal: {
                name: 'Главный портал',
                file: 'portal_main.html',
                icon: 'home',
                color: '#3498db'
            },
            lubrication: {
                name: 'График смазки',
                file: 'График-смазки7.html',
                icon: 'oil-can',
                color: '#3498db'
            },
            servo: {
                name: 'Диагностика сервоприводов',
                file: 'Диагностика серво двигателей.html',
                icon: 'microchip',
                color: '#27ae60'
            }
        };

        let currentApp = 'portal';
        let loadingTimeout = null;

        function switchApp(appId) {
            if (!apps[appId]) return;

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn${appId.charAt(0).toUpperCase() + appId.slice(1)}`).classList.add('active');

            const container = document.getElementById('iframeContainer');
            container.classList.add('loading');

            if (loadingTimeout) clearTimeout(loadingTimeout);

            loadingTimeout = setTimeout(() => {
                container.classList.remove('loading');
            }, 1000);

            const frame = document.getElementById('appFrame');
            frame.src = apps[appId].file;

            document.getElementById('statusText').textContent = `Активно: ${apps[appId].name}`;
            currentApp = appId;
        }

        document.getElementById('appFrame').addEventListener('load', function() {
            const container = document.getElementById('iframeContainer');
            if (container.classList.contains('loading')) {
                setTimeout(() => {
                    container.classList.remove('loading');
                }, 500);
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'lubrication_data_updated' || event.key === 'servo_data_updated') {
                document.getElementById('statusText').textContent = 'Данные обновлены';
                setTimeout(() => {
                    document.getElementById('statusText').textContent = `Активно: ${apps[currentApp].name}`;
                }, 3000);
            }
        });

        function checkFiles() {
            const files = [
                'portal_main.html',
                'График-смазки7.html',
                'Диагностика серво двигателей.html'
            ];

            files.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            console.warn(`⚠️ Файл ${file} не найден`);
                            document.getElementById('statusText').textContent = 'Некоторые файлы отсутствуют';
                        }
                    })
                    .catch(() => {
                        console.warn(`⚠️ Файл ${file} недоступен`);
                    });
            });
        }

        window.addEventListener('load', () => {
            checkFiles();
            document.getElementById('statusText').textContent = `Активно: ${apps.portal.name}`;
        });
    </script>

    <script>
        // Состояние виджета
        let aiWidgetMinimized = localStorage.getItem('aiWidgetMinimized') === 'true';

        document.addEventListener('DOMContentLoaded', function() {

        function createAIWidget() {
            const widget = document.getElementById('aiWidget');
            if (aiWidgetMinimized) {

            }
            
            const savedTheme = localStorage.getItem('aiWidgetTheme');

        function toggleAIWidget() {
            const widget = document.getElementById('aiWidget');
            widget.classList.toggle('minimized');
            localStorage.setItem('aiWidgetMinimized', widget.classList.contains('minimized'));
            
            if (!widget.classList.contains('minimized')) {
                analyzeWithAI();
            }
        }

        function toggleWidgetTheme() {
            const widget = document.getElementById('aiWidget');
            widget.classList.toggle('dark-theme');
            localStorage.setItem('aiWidgetTheme', widget.classList.contains('dark-theme') ? 'dark' : 'light');
        }

        function analyzeMissedOperations() {
            const lubeData = localStorage.getItem('lubrication_history_v28');
            if (!lubeData) return { total: 0, byEmployee: {}, lastWeek: 0 };
            
            try {
                const shifts = JSON.parse(lubeData);
                const missed = {
                    total: 0,
                    byEmployee: {},
                    lastWeek: 0
                };
                
                const today = new Date();
                const weekAgo = new Date(today.setDate(today.getDate() - 7)).toISOString().split('T')[0];
                
                Object.entries(shifts).forEach(([key, shift]) => {
                    if (!shift.completed || !shift.employee) return;
                    
                    const total = shift.visiblePoints?.length || 0;
                    const completed = shift.completed.length || 0;
                    const missedCount = total - completed;
                    
                    if (missedCount > 0) {
                        missed.total += missedCount;
                        missed.byEmployee[shift.employee] = (missed.byEmployee[shift.employee] || 0) + missedCount;
                        
                        const [date] = key.split('_');
                        if (date >= weekAgo) {
                            missed.lastWeek += missedCount;
                        }
                    }
                });
                
                return missed;
            } catch (e) {
                return { total: 0, byEmployee: {}, lastWeek: 0 };
            }
        }

        function getEmployeeRatings() {
            const missed = analyzeMissedOperations();
            const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
            
            const completed = {};
            Object.values(lubeData).forEach(shift => {
                if (shift.employee && shift.completed) {
                    completed[shift.employee] = (completed[shift.employee] || 0) + shift.completed.length;
                }
            });
            
            const ratings = [];
            const allEmployees = new Set([...Object.keys(missed.byEmployee), ...Object.keys(completed)]);
            
            allEmployees.forEach(name => {
                const m = missed.byEmployee[name] || 0;
                const c = completed[name] || 0;
                const total = m + c;
                
                ratings.push({
                    name: name,
                    missed: m,
                    completed: c,
                    efficiency: total > 0 ? Math.round((c / total) * 100) : 0
                });
            });
            
            return ratings.sort((a, b) => b.efficiency - a.efficiency);
        }

        function getTomorrowPrediction() {
            const missed = analyzeMissedOperations();
            const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
            
            const last7Days = [];
            for (let i = 1; i <= 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                let dayMissed = 0;
                Object.entries(lubeData).forEach(([key, shift]) => {
                    if (key.startsWith(dateStr) && shift.completed) {
                        const total = shift.visiblePoints?.length || 0;
                        const completed = shift.completed.length || 0;
                        dayMissed += (total - completed);
                    }
                });
                last7Days.push(dayMissed);
            }
            
            const avgMissed = last7Days.reduce((a, b) => a + b, 0) / last7Days.length;
            const trend = avgMissed > missed.total ? 'растёт' : 'снижается';
            
            let recommendation = '';
            if (avgMissed > 80) {
                recommendation = '🔴 Критический тренд! Нужно срочно действовать!';
            } else if (avgMissed > 50) {
                recommendation = '🟡 Требуется внимание руководства';
            } else {
                recommendation = '🟢 Ситуация стабилизируется';
            }
            
            return {
                predictedMissed: Math.round(avgMissed),
                trend: trend,
                recommendation: recommendation
            };
        }

        function showUrgentAlerts(analysis) {
            const missed = analyzeMissedOperations();
            
            document.querySelectorAll('.urgent-alert').forEach(el => el.remove());
            
            if (missed.total > 80) {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'urgent-alert';
                alertDiv.innerHTML = `
                    🔴 КРИТИЧЕСКАЯ СИТУАЦИЯ! ${missed.total} пропусков!
                    <button onclick="this.parentElement.remove()" style="margin-left: 20px; background: none; border: none; color: white; cursor: pointer; font-size: 18px;">✖</button>
                `;
                document.body.appendChild(alertDiv);
                
                setTimeout(() => alertDiv.remove(), 10000);
            }
        }

        function setupReminders() {
            setInterval(() => {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const today = now.toISOString().split('T')[0];
                
                const lubeData = JSON.parse(localStorage.getItem('lubrication_history_v28') || '{}');
                const hasTodayData = lubeData[`${today}_shift1`] || lubeData[`${today}_shift2`];
                
                if (hours === 19 && minutes === 55 && !hasTodayData) {
                    const reminder = document.createElement('div');
                    reminder.className = 'urgent-alert';
                    reminder.style.background = '#f39c12';
                    reminder.innerHTML = `
                        ⏰ Напоминание: через 5 минут смена 2! Внесите данные за сегодня
                        <button onclick="this.parentElement.remove()" style="margin-left: 20px; background: none; border: none; color: white; cursor: pointer;">✖</button>
                    `;
                    document.body.appendChild(reminder);
                    setTimeout(() => reminder.remove(), 10000);
                }
                
                if (hours === 8 && minutes === 5 && !hasTodayData) {
                    const reminder = document.createElement('div');
                    reminder.className = 'urgent-alert';
                    reminder.style.background = '#3498db';
                    reminder.innerHTML = `
                        🌅 Доброе утро! Не забудьте внести данные по смазке за сегодня
                        <button onclick="this.parentElement.remove()" style="margin-left: 20px; background: none; border: none; color: white; cursor: pointer;">✖</button>
                    `;
                    document.body.appendChild(reminder);
                    setTimeout(() => reminder.remove(), 10000);
                }
            }, 60000);
        }

        function analyzeWithAI() {
            const loading = document.getElementById('aiLoading');
            const content = document.getElementById('aiContent');
            const statusDot = document.getElementById('aiStatusDot');
            
            loading.style.display = 'flex';
            content.style.display = 'none';
            
            setTimeout(() => {
                const analysis = collectDataForAI();
                displayAIAnalysis(analysis);
                updateBadge(analysis);
                showUrgentAlerts(analysis);
                
                if (analysis.critical > 0) {
                    statusDot.className = 'ai-status red';
                } else if (analysis.warning > 0) {
                    statusDot.className = 'ai-status yellow';
                } else {
                    statusDot.className = 'ai-status green';
                }
                
                loading.style.display = 'none';
                content.style.display = 'block';
            }, 500);
        }

        function collectDataForAI() {
            const analysis = {
                critical: 0,
                warning: 0,
                info: 0,
                messages: [],
                tips: [],
                timestamp: new Date().toLocaleString()
            };
            
            try {
                const servoData = localStorage.getItem('servoChecks');
                if (servoData) {
                    const checks = JSON.parse(servoData);
                    if (checks.length > 0) {
                        const lastCheck = checks[0];
                        const daysSince = Math.floor((Date.now() - new Date(lastCheck.created).getTime()) / 86400000);
                        
                        if (daysSince > 7) {
                            analysis.warning++;
                            analysis.messages.push({
                                type: 'warning',
                                text: `⚠️ Давно не проверяли сервоприводы (${daysSince} дней)`
                            });
                        }
                        
                        if (lastCheck.servos) {
                            const criticalServos = lastCheck.servos.filter(s => s.status === 'critical');
                            if (criticalServos.length > 0) {
                                analysis.critical += criticalServos.length;
                                analysis.messages.push({
                                    type: 'critical',
                                    text: `🔴 ${criticalServos.length} сервоприводов в критическом состоянии!`
                                });
                            }
                        }
                    }
                }
            } catch (e) {}
            
            try {
                const lubeData = localStorage.getItem('lubrication_history_v28');
                if (lubeData) {
                    const shifts = JSON.parse(lubeData);
                    const today = new Date().toISOString().split('T')[0];
                    
                    if (!shifts[`${today}_shift1`] && !shifts[`${today}_shift2`]) {
                        analysis.warning++;
                        analysis.messages.push({
                            type: 'warning',
                            text: '⚠️ Сегодня ещё не внесены данные по смазке'
                        });
                    }
                    
                    const missedAnalysis = analyzeMissedOperations();
                    if (missedAnalysis.total > 0) {
                        analysis.info++;
                        analysis.messages.push({
                            type: 'info',
                            text: `📊 Всего пропущено: ${missedAnalysis.total}`
                        });
                        
                        if (missedAnalysis.lastWeek > 0) {
                            analysis.messages.push({
                                type: 'info',
                                text: `📅 За неделю: ${missedAnalysis.lastWeek}`
                            });
                        }
                        
                        const topOffenders = Object.entries(missedAnalysis.byEmployee)
                            .sort((a, b) => b[1] - a[1])
                            .slice(0, 2);
                        
                        topOffenders.forEach(([name, count]) => {
                            const shortName = name.split(' ').slice(0, 2).join(' ');
                            analysis.messages.push({
                                type: 'warning',
                                text: `👤 ${shortName}: ${count} пропусков`
                            });
                        });
                    }
                    
                    const prediction = getTomorrowPrediction();
                    analysis.messages.push({
                        type: 'info',
                        text: `🔮 Прогноз на завтра: ${prediction.predictedMissed} (${prediction.trend})`
                    });
                    
                    const ratings = getEmployeeRatings();
                    if (ratings.length > 0) {
                        let ratingText = '🏆 Доска почёта:\n';
                        ratings.slice(0, 3).forEach((r, i) => {
                            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
                            const name = r.name.split(' ')[0];
                            ratingText += `${medal} ${name}: ${r.efficiency}%\n`;
                        });
                        analysis.messages.push({
                            type: 'success',
                            text: ratingText
                        });
                    }
                }
            } catch (e) {}
            
            try {
                const employees = localStorage.getItem('nlvz_employees');
                if (employees) {
                    const empList = JSON.parse(employees);
                    analysis.info++;
                    analysis.messages.push({
                        type: 'success',
                        text: `👥 Активных сотрудников: ${empList.length}`
                    });
                }
            } catch (e) {}
            
            const prediction = getTomorrowPrediction();
            analysis.tips.push(prediction.recommendation);
            
            if (analysis.critical > 0) {
                analysis.tips.push('🚨 Немедленно проверьте критичные сервоприводы!');
            }
            
            return analysis;
        }

        function displayAIAnalysis(analysis) {
            const content = document.getElementById('aiContent');
            
            let html = `
                <div style="font-size: 12px; color: #a1bbd0; margin-bottom: 10px;">
                    🕐 ${analysis.timestamp}
                </div>
            `;
            
            analysis.messages.forEach(msg => {
                html += `<div class="ai-message ${msg.type}">${msg.text}</div>`;
            });
            
            if (analysis.tips.length > 0) {
                html += `<div class="ai-tip">💡 <strong>Совет:</strong> ${analysis.tips[0]}</div>`;
            }
            
            if (analysis.messages.length === 0) {
                html += `
                    <div class="ai-message success">
                        ✅ Все системы работают нормально. Отличная работа!
                    </div>
                `;
            }
            
            html += `
                <div style="display: flex; gap: 10px; margin-top: 15px; font-size: 12px; color: #a1bbd0;">
                    <span>🔴 ${analysis.critical}</span>
                    <span>🟡 ${analysis.warning}</span>
                    <span>🔵 ${analysis.info}</span>
                </div>
            `;
            
            content.innerHTML = html;
        }

        function updateBadge(analysis) {
            const totalIssues = analysis.critical + analysis.warning;
            const header = document.querySelector('.ai-header');
            if (!header) return;
            
            let badge = document.querySelector('.ai-badge');
            if (!badge && totalIssues > 0) {
                badge = document.createElement('span');
                badge.className = 'ai-badge';
                header.appendChild(badge);
            }
            
            if (badge) {
                if (totalIssues > 0) {
                    badge.textContent = totalIssues > 9 ? '9+' : totalIssues;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function refreshAIAnalysis() {
            analyzeWithAI();
        }

        // Функция отправки отчёта на Яндекс.Почту
        async function sendYandexReport() {
            const loading = document.getElementById('aiLoading');
            loading.style.display = 'flex';
            
            try {
                const missed = analyzeMissedOperations();
                const ratings = getEmployeeRatings();
                const prediction = getTomorrowPrediction();
                
                // Формируем список сотрудников для письма
                let employeeList = '';
                Object.entries(missed.byEmployee)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10)
                    .forEach(([name, count]) => {
                        employeeList += `
                            <div class="employee-item">
                                <span class="employee-name">${name}</span>
                                <span class="employee-count">${count} проп.</span>
                            </div>
                        `;
                    });
                
                // Получаем имя сотрудника (если есть)
                const inspectorName = localStorage.getItem('lastInspector') || 'Сотрудник';
                
                // Параметры для шаблона
                const templateParams = {
                    to_email: 'nlzvopvz@yandex.ru',
                    employee: inspectorName,
                    date: new Date().toLocaleDateString('ru-RU'),
                    time: new Date().toLocaleTimeString('ru-RU'),
                    total_missed: missed.total,
                    week_missed: missed.lastWeek,
                    employees_count: Object.keys(missed.byEmployee).length || 1,
                    employee_list: employeeList,
                    prediction: prediction.recommendation
                };
                
                // Отправка через EmailJS
                const response = await emailjs.send(
                    SERVICE_ID,
                    TEMPLATE_ID,
                    templateParams
                );
                
                alert('✅ Отчёт отправлен на nlzvopvz@yandex.ru!\n\n' +
                      `📊 Пропусков: ${missed.total}\n` +
                      `📅 За неделю: ${missed.lastWeek}\n` +
                      `🔮 Прогноз: ${prediction.recommendation}`);
                
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка при отправке. Проверьте:\n' +
                      '1. Public Key в emailjs.init()\n' +
                      '2. Template ID\n' +
                      '3. Интернет-соединение');
            } finally {
                loading.style.display = 'none';
            }
        }

        // Кнопка в навигацию
        function addAIToNav() {
            const navPanel = document.querySelector('.nav-panel');
            if (navPanel) {
                const aiNavBtn = document.createElement('button');
                aiNavBtn.className = 'nav-btn';
                aiNavBtn.innerHTML = '<i class="fas fa-robot"></i> AI-анализ';
                aiNavBtn.onclick = function() {
                    if (document.getElementById('aiWidget').classList.contains('minimized')) {
                        toggleAIWidget();
                    }
                    analyzeWithAI();
                };
                navPanel.querySelector('.nav-buttons').appendChild(aiNavBtn);
            }
        }

        window.addEventListener('load', addAIToNav);

        // Для вызова из консоли
        window.sendYandexReport = sendYandexReport;
    </script>
