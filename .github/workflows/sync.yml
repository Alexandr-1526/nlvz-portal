name: Sync Data

on:
  repository_dispatch:
    types: [sync-data]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update db_portal.json
        run: |
          echo '${{ github.event.client_payload.data }}' > db_portal.json
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add db_portal.json
          git commit -m "Auto-sync data from portal" || exit 0
          git push
